<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Application/Website</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    
    <div class="card">
      <div class="search">
        <input type="text" placeholder="Enter City Name" spellcheck="false" />
        <button><img src="images/search.png" /></button>
      </div>
      <div class="error">
        <p> Invalid City Name...</p>
      </div>
      <div class="weather">
        <img src="images/rain1.png" class="weather-icon" />
        <h1 class="temp"></h1>
        <h2 class="city"></h2>
        <div class="details">
          <div class="col">
            <img src="images/wind.png" />
            <div>
              <p class="windspeed"></p>
              <p><span style="margin-left: 6px">Wind Speed</span></p>
            </div>
          </div>
          <div class="col">
            <img src="images/humidity.png" />
            <div>
              <p class="humidity"></p>
              <p><span style="margin-left: 13px"> Humidity</span></p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="javaScript.js"></script>

  </body>
</html>
